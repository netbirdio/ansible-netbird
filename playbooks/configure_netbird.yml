---
# Playbook: Configure NetBird via API (Infrastructure as Code)
#
# Thin wrapper around the community.ansible_netbird.configure role.
# See the role documentation for full details.
#
# Preview (default — read-only diff):
#   ansible-playbook community.ansible_netbird.configure_netbird \
#     -e "config_dir=/path/to/netbird_config" \
#     -e "netbird_api_url=https://netbird.example.com" \
#     -e "netbird_api_token=your-token"
#
# Apply:
#   ansible-playbook community.ansible_netbird.configure_netbird \
#     -e "config_dir=/path/to/netbird_config" \
#     -e "netbird_api_url=https://netbird.example.com" \
#     -e "netbird_api_token=your-token" \
#     -e "commit=true"
#
# Apply + strict:
#   ... -e "commit=true" -e "strict=true"
#
# Optional variables:
#   - target_hosts: Host or group to run on (default: localhost)

- name: Configure NetBird from IaC Definitions
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false
  roles:
    - role: community.ansible_netbird.configure
      run_once: true
