---
- name: Deploy NetBird self-hosted
  hosts: netbird
  gather_facts: true
  become: false

  vars:
    # Prompted By Original Script
    netbird_domain: ""
    reverse_proxy_type: builtin_traefik
    traefik_acme_email: ""
    enable_proxy: false
    enable_crowdsec: false
    traefik_external_network: ""
    traefik_entrypoint: websecure
    traefik_certresolver: ""
    bind_localhost_only: true
    external_proxy_network: ""
    start_netbird_services: true
    create_netbird_user: false
    netbird_user: netbird

    # Optional Variables
    netbird_project_dir: "{{ ansible_user_dir }}/netbird"
    dashboard_host_port: 8080
    management_host_port: 8081
    netbird_stun_port: 3478
    dashboard_image: netbirdio/dashboard:latest
    netbird_server_image: netbirdio/netbird-server:latest
    netbird_proxy_image: netbirdio/reverse-proxy:latest
    traefik_image: traefik:v3.6
    crowdsec_image: crowdsecurity/crowdsec:v1.7.7
    traefik_ip: 172.30.0.10
    traefik_subnet: 172.30.0.0/24
    traefik_gateway: 172.30.0.1

    # Internal Variables
    docker_socket_path: /var/run/docker.sock

    # Constants
    reverse_proxy_types:
      - builtin_traefik
      - external_traefik
      - nginx
      - npm
      - caddy
      - manual
    external_port_binding_proxy_types:
      - nginx
      - npm
      - caddy
      - manual
    external_proxy_network_types:
      - nginx
      - npm
      - caddy

  pre_tasks:
    - name: Require NetBird domain
      ansible.builtin.assert:
        that:
          - netbird_domain is defined
          - netbird_domain | length > 0
          - netbird_domain != 'netbird.example.com'
          - netbird_domain == 'use-ip' or netbird_domain is match('^(?=.{1,253}$)(?!-)([A-Za-z0-9-]{1,63}\\.)+[A-Za-z]{2,63}$')
        fail_msg: >-
          Set netbird_domain to a real FQDN before running this playbook, or set it to use-ip
          for a non-TLS IP-based test deployment. Do not include http:// or https://.

    - name: Validate reverse proxy type
      ansible.builtin.assert:
        that:
          - reverse_proxy_type in reverse_proxy_types
        fail_msg: >-
          reverse_proxy_type must be one of: {{ reverse_proxy_types | join(', ') }}.

    - name: Validate boolean options
      ansible.builtin.assert:
        that:
          - enable_proxy | string | lower in ['true', 'false']
          - enable_crowdsec | string | lower in ['true', 'false']
          - bind_localhost_only | string | lower in ['true', 'false']
          - start_netbird_services | string | lower in ['true', 'false']
          - create_netbird_user | string | lower in ['true', 'false']
        fail_msg: "enable_proxy, enable_crowdsec, bind_localhost_only, start_netbird_services, and create_netbird_user must be true or false."

    - name: Validate NetBird user name
      ansible.builtin.assert:
        that:
          - netbird_user is match('^[a-z_][a-z0-9_-]{0,31}$')
        fail_msg: "netbird_user must be a valid Linux user name."
      when: create_netbird_user | bool

    - name: Require Traefik ACME email for built-in Traefik
      ansible.builtin.assert:
        that:
          - traefik_acme_email | length > 0
          - traefik_acme_email is match('^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$')
        fail_msg: "Set traefik_acme_email to a valid email address when reverse_proxy_type is builtin_traefik."
      when: reverse_proxy_type == 'builtin_traefik'

    - name: Validate external Traefik settings
      ansible.builtin.assert:
        that:
          - traefik_entrypoint | length > 0
        fail_msg: "traefik_entrypoint cannot be empty when reverse_proxy_type is external_traefik."
      when: reverse_proxy_type == 'external_traefik'

    - name: Validate external proxy port settings
      ansible.builtin.assert:
        that:
          - dashboard_host_port | int > 0
          - dashboard_host_port | int <= 65535
          - management_host_port | int > 0
          - management_host_port | int <= 65535
        fail_msg: "dashboard_host_port and management_host_port must be valid TCP ports."
      when: reverse_proxy_type in external_port_binding_proxy_types

    - name: Reject CrowdSec without NetBird proxy
      ansible.builtin.assert:
        that:
          - not (enable_crowdsec | bool)
        fail_msg: "enable_crowdsec requires enable_proxy=true."
      when: not (enable_proxy | bool)

    - name: Reject NetBird proxy without built-in Traefik
      ansible.builtin.assert:
        that:
          - reverse_proxy_type == 'builtin_traefik'
        fail_msg: "enable_proxy is only supported when reverse_proxy_type is builtin_traefik."
      when: enable_proxy | bool

    - name: Set main host IPv4 address
      ansible.builtin.set_fact:
        main_ipv4_address: "{{ ansible_default_ipv4.address | default('') }}"

    - name: Fail when main host IPv4 address cannot be determined
      ansible.builtin.fail:
        msg: "Could not determine the host's main IPv4 address from Ansible facts."
      when: main_ipv4_address | length == 0

    - name: Set effective NetBird domain
      ansible.builtin.set_fact:
        effective_netbird_domain: "{{ main_ipv4_address if netbird_domain == 'use-ip' else netbird_domain }}"
        effective_domain: "{{ main_ipv4_address if netbird_domain == 'use-ip' else netbird_domain }}"

    - name: Set domain-derived NetBird values
      ansible.builtin.set_fact:
        netbird_port: "{{ 80 if netbird_domain == 'use-ip' else 443 }}"
        netbird_http_protocol: "{{ 'http' if netbird_domain == 'use-ip' else 'https' }}"
        netbird_relay_proto: "{{ 'rel' if netbird_domain == 'use-ip' else 'rels' }}"
        base_domain: "{{ main_ipv4_address if netbird_domain == 'use-ip' else netbird_domain | regex_replace('^[^.]+\\.', '') }}"

    - name: Set bind and upstream addresses
      ansible.builtin.set_fact:
        bind_address: "{{ '127.0.0.1' if bind_localhost_only | bool else '0.0.0.0' }}"
        upstream_host: "127.0.0.1"

    - name: Set reverse proxy derived values
      ansible.builtin.set_fact:
        effective_traefik_network: "{{ traefik_external_network if traefik_external_network | length > 0 else 'netbird' }}"
        effective_external_proxy_network: "{{ external_proxy_network if reverse_proxy_type in external_proxy_network_types else '' }}"
        use_exposed_container_ports: "{{ reverse_proxy_type in external_port_binding_proxy_types }}"
        use_builtin_traefik: "{{ reverse_proxy_type == 'builtin_traefik' }}"
        use_external_traefik: "{{ reverse_proxy_type == 'external_traefik' }}"
        use_netbird_proxy: "{{ enable_proxy | bool and reverse_proxy_type == 'builtin_traefik' }}"
        use_crowdsec: "{{ enable_proxy | bool and enable_crowdsec | bool and reverse_proxy_type == 'builtin_traefik' }}"

    - name: Check Docker socket
      ansible.builtin.stat:
        path: "{{ docker_socket_path }}"
      register: docker_socket

    - name: Fail when Docker socket is missing
      ansible.builtin.fail:
        msg: "Docker socket {{ docker_socket_path }} was not found. Install and start Docker first."
      when: not docker_socket.stat.exists

    - name: Require standard Docker group for NetBird user creation
      ansible.builtin.assert:
        that:
          - docker_socket.stat.gr_name | default('') == 'docker'
        fail_msg: >-
          create_netbird_user=true requires {{ docker_socket_path }} to be owned by the standard
          'docker' group. The socket is owned by '{{ docker_socket.stat.gr_name | default(docker_socket.stat.gid) }}'.
      when: create_netbird_user | bool

    - name: Ensure NetBird user has Docker access
      ansible.builtin.user:
        name: "{{ netbird_user }}"
        groups:
          - docker
        append: true
        shell: /bin/bash
        create_home: true
        state: present
      become: true
      when: create_netbird_user | bool

    - name: Check NetBird user groups
      ansible.builtin.command: "id -nG {{ netbird_user }}"
      register: netbird_user_groups
      changed_when: false
      when: create_netbird_user | bool

    - name: Verify NetBird user is in Docker group
      ansible.builtin.assert:
        that:
          - "'docker' in netbird_user_groups.stdout.split()"
        fail_msg: "The {{ netbird_user }} user was created, but it is not a member of the docker group."
      when: create_netbird_user | bool

    - name: Check Docker access for NetBird user
      ansible.builtin.command: docker info
      register: netbird_user_docker_info_check
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ netbird_user }}"
      when: create_netbird_user | bool

    - name: Fail when NetBird user cannot access Docker
      ansible.builtin.fail:
        msg: >-
          The {{ netbird_user }} user exists and is in the docker group, but it cannot run
          'docker info'. Log in again as that user so group membership is refreshed, then rerun
          the playbook.
      when:
        - create_netbird_user | bool
        - netbird_user_docker_info_check.rc != 0

    - name: Check Docker access for current Ansible user
      ansible.builtin.command: docker info
      register: docker_info_check
      changed_when: false
      failed_when: false

    - name: Fail with Docker group guidance
      ansible.builtin.fail:
        msg: |
          Cannot access Docker socket: {{ docker_socket_path }}

          Socket permissions:
          owner={{ docker_socket.stat.pw_name | default(docker_socket.stat.uid) }}
          group={{ docker_socket.stat.gr_name | default(docker_socket.stat.gid) }}
          mode={{ docker_socket.stat.mode }}

          Your Ansible user may need to be added to the 'docker' group:

            sudo usermod -aG docker {{ ansible_user_id }}

          Then log out and back in before running Ansible again.
          For the current shell only, you can use:

            newgrp docker

          Note: newgrp is temporary; usermod is the permanent group change.
      when:
        - docker_info_check.rc != 0
        - docker_socket.stat.gr_name | default('') == 'docker'

    - name: Fail with generic Docker socket guidance
      ansible.builtin.fail:
        msg: |
          Cannot access Docker socket: {{ docker_socket_path }}

          Socket permissions:
          owner={{ docker_socket.stat.pw_name | default(docker_socket.stat.uid) }}
          group={{ docker_socket.stat.gr_name | default(docker_socket.stat.gid) }}
          mode={{ docker_socket.stat.mode }}

          The Docker socket is owned by the '{{ docker_socket.stat.gr_name | default(docker_socket.stat.gid) }}' group,
          which is not the standard 'docker' group.

          For safety, this playbook will not suggest adding your user to that group.
          Either run the playbook with an account that already has Docker access, or follow Docker's post-install steps:
          https://docs.docker.com/engine/install/linux-postinstall/
      when:
        - docker_info_check.rc != 0
        - docker_socket.stat.gr_name | default('') != 'docker'

    - name: Check for Docker Compose v2
      ansible.builtin.command: docker compose version
      register: compose_v2_check
      changed_when: false
      failed_when: false

    - name: Check for docker-compose v1
      ansible.builtin.command: docker-compose version
      register: compose_v1_check
      changed_when: false
      failed_when: false
      when: compose_v2_check.rc != 0

    - name: Fail when Docker Compose is unavailable
      ansible.builtin.fail:
        msg: |
          Docker Compose is not installed or not in PATH.

          Install Docker Compose v2 with the Docker Engine compose plugin,
          or install legacy docker-compose before running this playbook.
      when:
        - compose_v2_check.rc != 0
        - compose_v1_check.rc | default(1) != 0

    - name: Select Docker Compose command
      ansible.builtin.set_fact:
        compose_bin: "{{ 'docker compose' if compose_v2_check.rc == 0 else 'docker-compose' }}"

    - name: Check for jq
      ansible.builtin.command: jq --version
      register: jq_check
      changed_when: false
      failed_when: false

    - name: Fail when jq is unavailable
      ansible.builtin.fail:
        msg: "jq is not installed or not in PATH. Install jq with your package manager before running this playbook."
      when: jq_check.rc != 0

    - name: Check for OpenSSL
      ansible.builtin.command: openssl version
      register: openssl_check
      changed_when: false
      failed_when: false

    - name: Fail when OpenSSL is unavailable
      ansible.builtin.fail:
        msg: "OpenSSL is not installed or not in PATH. Install openssl before running this playbook."
      when: openssl_check.rc != 0

  tasks:
    - name: Create NetBird project directory
      ansible.builtin.file:
        path: "{{ netbird_project_dir }}"
        state: directory
        mode: "0750"

    - name: Check existing generated config
      ansible.builtin.stat:
        path: "{{ netbird_project_dir }}/config.yaml"
      register: existing_config

    - name: Refuse accidental reinitialization unless explicitly allowed
      ansible.builtin.fail:
        msg: >-
          {{ netbird_project_dir }}/config.yaml already exists. This playbook will not reinitialize secrets by default.
          Set allow_existing_config=true to manage the existing deployment in-place.
      when:
        - existing_config.stat.exists
        - not (allow_existing_config | default(false) | bool)

    - name: Generate relay auth secret when missing
      ansible.builtin.shell: "openssl rand -base64 32 | tr -d '=' > {{ netbird_project_dir }}/relay_auth_secret"
      args:
        creates: "{{ netbird_project_dir }}/relay_auth_secret"

    - name: Generate datastore encryption key when missing
      ansible.builtin.shell: "openssl rand -base64 32 > {{ netbird_project_dir }}/datastore_encryption_key"
      args:
        creates: "{{ netbird_project_dir }}/datastore_encryption_key"

    - name: Protect secret files
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "0600"
      loop:
        - "{{ netbird_project_dir }}/relay_auth_secret"
        - "{{ netbird_project_dir }}/datastore_encryption_key"

    - name: Read relay auth secret
      ansible.builtin.slurp:
        path: "{{ netbird_project_dir }}/relay_auth_secret"
      register: relay_auth_secret_raw
      no_log: true

    - name: Read datastore encryption key
      ansible.builtin.slurp:
        path: "{{ netbird_project_dir }}/datastore_encryption_key"
      register: datastore_encryption_key_raw
      no_log: true

    - name: Set secret facts
      ansible.builtin.set_fact:
        netbird_relay_auth_secret: "{{ relay_auth_secret_raw.content | b64decode | trim }}"
        datastore_encryption_key: "{{ datastore_encryption_key_raw.content | b64decode | trim }}"
      no_log: true

    - name: Create CrowdSec config directory when enabled
      ansible.builtin.file:
        path: "{{ netbird_project_dir }}/crowdsec"
        state: directory
        mode: "0755"
      when: use_crowdsec | bool

    - name: Render dashboard.env
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/dashboard.env"
        mode: "0640"
        content: |
          # Endpoints
          NETBIRD_MGMT_API_ENDPOINT={{ netbird_http_protocol }}://{{ effective_netbird_domain }}
          NETBIRD_MGMT_GRPC_API_ENDPOINT={{ netbird_http_protocol }}://{{ effective_netbird_domain }}
          # OIDC - using embedded IdP
          AUTH_AUDIENCE=netbird-dashboard
          AUTH_CLIENT_ID=netbird-dashboard
          AUTH_CLIENT_SECRET=
          AUTH_AUTHORITY={{ netbird_http_protocol }}://{{ effective_netbird_domain }}/oauth2
          USE_AUTH0=false
          AUTH_SUPPORTED_SCOPES=openid profile email groups
          AUTH_REDIRECT_URI=/nb-auth
          AUTH_SILENT_REDIRECT_URI=/nb-silent-auth
          # SSL
          NGINX_SSL_PORT=443
          # Letsencrypt
          LETSENCRYPT_DOMAIN=none

    - name: Render combined NetBird server config
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/config.yaml"
        mode: "0640"
        content: |
          # Combined NetBird Server Configuration
          # Generated by Ansible from getting-started.sh logic

          server:
            listenAddress: ":80"
            exposedAddress: "{{ netbird_http_protocol }}://{{ effective_netbird_domain }}:{{ netbird_port }}"
            stunPorts:
              - {{ netbird_stun_port }}
            metricsPort: 9090
            healthcheckAddress: ":9000"
            logLevel: "info"
            logFile: "console"

            authSecret: "{{ netbird_relay_auth_secret }}"
            dataDir: "/var/lib/netbird"

            auth:
              issuer: "{{ netbird_http_protocol }}://{{ effective_netbird_domain }}/oauth2"
              signKeyRefreshEnabled: true
              dashboardRedirectURIs:
                - "{{ netbird_http_protocol }}://{{ effective_netbird_domain }}/nb-auth"
                - "{{ netbird_http_protocol }}://{{ effective_netbird_domain }}/nb-silent-auth"
              cliRedirectURIs:
                - "http://localhost:53000/"

            reverseProxy:
              trustedHTTPProxies:
                - "{{ traefik_ip }}/32"

            store:
              engine: "sqlite"
              encryptionKey: "{{ datastore_encryption_key }}"
      no_log: true

    - name: Render Traefik dynamic config for proxy passthrough
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/traefik-dynamic.yaml"
        mode: "0644"
        content: |
          tcp:
            serversTransports:
              pp-v2:
                proxyProtocol:
                  version: 2
      when: use_netbird_proxy | bool

    - name: Create placeholder proxy.env before token creation
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/proxy.env"
        mode: "0600"
        force: false
        content: |
          # Placeholder - overwritten after netbird-server creates a proxy token
          NB_PROXY_TOKEN=placeholder
      when: use_netbird_proxy | bool

    - name: Render docker-compose.yml
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/docker-compose.yml"
        mode: "0644"
        content: |
          services:
          {% if use_builtin_traefik | bool %}
            traefik:
              image: {{ traefik_image }}
              container_name: netbird-traefik
              restart: unless-stopped
              networks:
                netbird:
                  ipv4_address: {{ traefik_ip }}
              command:
                - "--log.level=INFO"
                - "--accesslog=true"
                - "--providers.docker=true"
                - "--providers.docker.exposedbydefault=false"
                - "--providers.docker.network=netbird"
                - "--entrypoints.web.address=:80"
                - "--entrypoints.websecure.address=:443"
                - "--entrypoints.websecure.allowACMEByPass=true"
                - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0"
                - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0"
                - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=0"
                - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
                - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
                - "--certificatesresolvers.letsencrypt.acme.email={{ traefik_acme_email }}"
                - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
                - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
                - "--serverstransport.forwardingtimeouts.responseheadertimeout=0s"
                - "--serverstransport.forwardingtimeouts.idleconntimeout=0s"
          {% if use_netbird_proxy | bool %}
                - "--providers.file.filename=/etc/traefik/dynamic.yaml"
          {% endif %}
              ports:
                - "443:443"
                - "80:80"
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock:ro
                - netbird_traefik_letsencrypt:/letsencrypt
          {% if use_netbird_proxy | bool %}
                - ./traefik-dynamic.yaml:/etc/traefik/dynamic.yaml:ro
          {% endif %}
              logging:
                driver: json-file
                options: {max-size: "500m", max-file: "2"}

          {% endif %}
            dashboard:
              image: {{ dashboard_image }}
              container_name: netbird-dashboard
              restart: unless-stopped
          {% if use_external_traefik | bool %}
              networks: [{{ effective_traefik_network }}]
          {% elif use_exposed_container_ports | bool and effective_external_proxy_network | length > 0 %}
              networks: [netbird, {{ effective_external_proxy_network }}]
          {% else %}
              networks: [netbird]
          {% endif %}
          {% if use_exposed_container_ports | bool %}
              ports:
                - "{{ bind_address }}:{{ dashboard_host_port }}:80"
          {% endif %}
              env_file:
                - ./dashboard.env
          {% if use_builtin_traefik | bool or use_external_traefik | bool %}
              labels:
                - traefik.enable=true
                - traefik.http.routers.netbird-dashboard.rule=Host(`{{ effective_netbird_domain }}`)
                - traefik.http.routers.netbird-dashboard.entrypoints={{ 'websecure' if use_builtin_traefik | bool else traefik_entrypoint }}
                - traefik.http.routers.netbird-dashboard.tls=true
          {% if use_builtin_traefik | bool %}
                - traefik.http.routers.netbird-dashboard.tls.certresolver=letsencrypt
          {% elif traefik_certresolver | length > 0 %}
                - traefik.http.routers.netbird-dashboard.tls.certresolver={{ traefik_certresolver }}
          {% endif %}
                - traefik.http.routers.netbird-dashboard.priority=1
                - traefik.http.services.netbird-dashboard.loadbalancer.server.port=80
          {% endif %}
              logging:
                driver: json-file
                options: {max-size: "500m", max-file: "2"}

            netbird-server:
              image: {{ netbird_server_image }}
              container_name: netbird-server
              restart: unless-stopped
          {% if use_external_traefik | bool %}
              networks: [{{ effective_traefik_network }}]
          {% elif use_exposed_container_ports | bool and effective_external_proxy_network | length > 0 %}
              networks: [netbird, {{ effective_external_proxy_network }}]
          {% else %}
              networks: [netbird]
          {% endif %}
              ports:
          {% if use_exposed_container_ports | bool %}
                - "{{ bind_address }}:{{ management_host_port }}:80"
          {% endif %}
                - "{{ netbird_stun_port }}:{{ netbird_stun_port }}/udp"
              volumes:
                - netbird_data:/var/lib/netbird
                - ./config.yaml:/etc/netbird/config.yaml
              command: ["--config", "/etc/netbird/config.yaml"]
          {% if use_builtin_traefik | bool or use_external_traefik | bool %}
              labels:
                - traefik.enable=true
                - traefik.http.routers.netbird-grpc.rule=Host(`{{ effective_netbird_domain }}`) && (PathPrefix(`/signalexchange.SignalExchange/`) || PathPrefix(`/management.ManagementService/`) || PathPrefix(`/management.ProxyService/`))
                - traefik.http.routers.netbird-grpc.entrypoints={{ 'websecure' if use_builtin_traefik | bool else traefik_entrypoint }}
                - traefik.http.routers.netbird-grpc.tls=true
          {% if use_builtin_traefik | bool %}
                - traefik.http.routers.netbird-grpc.tls.certresolver=letsencrypt
          {% elif traefik_certresolver | length > 0 %}
                - traefik.http.routers.netbird-grpc.tls.certresolver={{ traefik_certresolver }}
          {% endif %}
                - traefik.http.routers.netbird-grpc.service=netbird-server-h2c
                - traefik.http.routers.netbird-grpc.priority=100
                - traefik.http.routers.netbird-backend.rule=Host(`{{ effective_netbird_domain }}`) && (PathPrefix(`/relay`) || PathPrefix(`/ws-proxy/`) || PathPrefix(`/api`) || PathPrefix(`/oauth2`))
                - traefik.http.routers.netbird-backend.entrypoints={{ 'websecure' if use_builtin_traefik | bool else traefik_entrypoint }}
                - traefik.http.routers.netbird-backend.tls=true
          {% if use_builtin_traefik | bool %}
                - traefik.http.routers.netbird-backend.tls.certresolver=letsencrypt
          {% elif traefik_certresolver | length > 0 %}
                - traefik.http.routers.netbird-backend.tls.certresolver={{ traefik_certresolver }}
          {% endif %}
                - traefik.http.routers.netbird-backend.service=netbird-server
                - traefik.http.routers.netbird-backend.priority=100
                - traefik.http.services.netbird-server.loadbalancer.server.port=80
                - traefik.http.services.netbird-server-h2c.loadbalancer.server.port=80
                - traefik.http.services.netbird-server-h2c.loadbalancer.server.scheme=h2c
          {% endif %}
              logging:
                driver: json-file
                options: {max-size: "500m", max-file: "2"}

          {% if use_netbird_proxy | bool %}
            proxy:
              image: {{ netbird_proxy_image }}
              container_name: netbird-proxy
              ports:
                - "51820:51820/udp"
              restart: unless-stopped
              networks: [netbird]
              depends_on:
                netbird-server:
                  condition: service_started
          {% if use_crowdsec | bool %}
                crowdsec:
                  condition: service_healthy
          {% endif %}
              env_file:
                - ./proxy.env
              volumes:
                - netbird_proxy_certs:/certs
              labels:
                - traefik.enable=true
                - traefik.tcp.routers.proxy-passthrough.entrypoints=websecure
                - traefik.tcp.routers.proxy-passthrough.rule=HostSNI(`*`)
                - traefik.tcp.routers.proxy-passthrough.tls.passthrough=true
                - traefik.tcp.routers.proxy-passthrough.service=proxy-tls
                - traefik.tcp.routers.proxy-passthrough.priority=1
                - traefik.tcp.services.proxy-tls.loadbalancer.server.port=8443
                - traefik.tcp.services.proxy-tls.loadbalancer.serverstransport=pp-v2@file
              logging:
                driver: json-file
                options: {max-size: "500m", max-file: "2"}

          {% if use_crowdsec | bool %}
            crowdsec:
              image: {{ crowdsec_image }}
              container_name: netbird-crowdsec
              restart: unless-stopped
              networks: [netbird]
              environment:
                COLLECTIONS: crowdsecurity/linux
              volumes:
                - ./crowdsec:/etc/crowdsec
                - crowdsec_db:/var/lib/crowdsec/data
              healthcheck:
                test: ["CMD", "cscli", "lapi", "status"]
                interval: 10s
                timeout: 5s
                retries: 15
              labels:
                - traefik.enable=false
              logging:
                driver: json-file
                options: {max-size: "500m", max-file: "2"}
          {% endif %}
          {% endif %}

          volumes:
            netbird_data:
          {% if use_builtin_traefik | bool %}
            netbird_traefik_letsencrypt:
          {% endif %}
          {% if use_netbird_proxy | bool %}
            netbird_proxy_certs:
          {% endif %}
          {% if use_crowdsec | bool %}
            crowdsec_db:
          {% endif %}

          networks:
          {% if use_external_traefik | bool and traefik_external_network | length > 0 %}
            {{ effective_traefik_network }}:
              external: true
          {% elif use_builtin_traefik | bool %}
            netbird:
              driver: bridge
              ipam:
                config:
                  - subnet: {{ traefik_subnet }}
                    gateway: {{ traefik_gateway }}
          {% else %}
            netbird:
          {% if effective_external_proxy_network | length > 0 %}
            {{ effective_external_proxy_network }}:
              external: true
          {% endif %}
          {% endif %}

    - name: Render Nginx config
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/nginx-netbird.conf"
        mode: "0644"
        content: |
          # NetBird Nginx Configuration
          upstream netbird_dashboard {
              server {{ 'netbird-dashboard:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ dashboard_host_port }};
              keepalive 10;
          }
          upstream netbird_server {
              server {{ 'netbird-server:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ management_host_port }};
          }

          server {
              listen 80;
              server_name {{ effective_netbird_domain }};
              location / { return 301 https://$host$request_uri; }
          }

          server {
              listen 443 ssl http2;
              server_name {{ effective_netbird_domain }};

              ssl_certificate /path/to/your/fullchain.pem;
              ssl_certificate_key /path/to/your/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers off;

              client_header_timeout 1d;
              client_body_timeout 1d;

              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Scheme $scheme;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-Host $host;
              grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

              location ~ ^/(relay|ws-proxy/) {
                  proxy_pass http://netbird_server;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "Upgrade";
                  proxy_set_header Host $host;
                  proxy_read_timeout 1d;
              }

              location ~ ^/(signalexchange\.SignalExchange|management\.ManagementService)/ {
                  grpc_pass grpc://netbird_server;
                  grpc_read_timeout 1d;
                  grpc_send_timeout 1d;
                  grpc_socket_keepalive on;
              }

              location ~ ^/(api|oauth2)/ {
                  proxy_pass http://netbird_server;
                  proxy_set_header Host $host;
              }

              location / {
                  proxy_pass http://netbird_dashboard;
              }
          }
      when: reverse_proxy_type == 'nginx'

    - name: Render Nginx Proxy Manager advanced config
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/npm-advanced-config.txt"
        mode: "0644"
        content: |
          # Advanced Configuration for Nginx Proxy Manager
          # Paste this into the Advanced tab of your Proxy Host configuration.
          # Enable HTTP/2 Support in the SSL tab for gRPC.

          client_header_timeout 1d;
          client_body_timeout 1d;

          location ~ ^/(relay|ws-proxy/) {
              proxy_pass http://{{ 'netbird-server:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ management_host_port }};
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_read_timeout 1d;
          }

          location ~ ^/(signalexchange\.SignalExchange|management\.ManagementService)/ {
              grpc_pass grpc://{{ 'netbird-server:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ management_host_port }};
              grpc_read_timeout 1d;
              grpc_send_timeout 1d;
              grpc_socket_keepalive on;
          }

          location ~ ^/(api|oauth2)/ {
              proxy_pass http://{{ 'netbird-server:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ management_host_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      when: reverse_proxy_type == 'npm'

    - name: Render Caddyfile snippet
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/caddyfile-netbird.txt"
        mode: "0644"
        content: |
          # NetBird Caddyfile Snippet
          {{ effective_netbird_domain }} {
              @grpc header Content-Type application/grpc*
              reverse_proxy @grpc h2c://{{ 'netbird-server:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ management_host_port }}

              @backend path /relay* /ws-proxy/* /api/* /oauth2/*
              reverse_proxy @backend {{ 'netbird-server:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ management_host_port }}

              reverse_proxy /* {{ 'netbird-dashboard:80' if effective_external_proxy_network | length > 0 else upstream_host ~ ':' ~ dashboard_host_port }}
          }
      when: reverse_proxy_type == 'caddy'

    - name: Show external reverse proxy preparation step
      ansible.builtin.debug:
        msg:
          - "Generated NetBird files in {{ netbird_project_dir }}."
          - "Configure your {{ reverse_proxy_type }} reverse proxy with the generated file before continuing."
          - "Use nginx-netbird.conf for nginx, caddyfile-netbird.txt for caddy, or your own equivalent routing for manual."
      when:
        - start_netbird_services | bool
        - reverse_proxy_type in ['nginx', 'caddy', 'manual']

    - name: Wait for external reverse proxy confirmation
      ansible.builtin.pause:
        prompt: "Press Enter after your external reverse proxy is configured, or Ctrl+C then A to abort"
      when:
        - start_netbird_services | bool
        - reverse_proxy_type in ['nginx', 'caddy', 'manual']

    - name: Start built-in Traefik core services first when proxy is enabled
      ansible.builtin.command: "{{ compose_bin }} up -d traefik dashboard netbird-server{% if use_crowdsec | bool %} crowdsec{% endif %}"
      args:
        chdir: "{{ netbird_project_dir }}"
      when:
        - start_netbird_services | bool
        - use_netbird_proxy | bool

    - name: Start NetBird services
      ansible.builtin.command: "{{ compose_bin }} up -d"
      args:
        chdir: "{{ netbird_project_dir }}"
      when:
        - start_netbird_services | bool
        - not (use_netbird_proxy | bool)

    - name: Wait for NetBird server through public endpoint
      ansible.builtin.uri:
        url: "{{ netbird_http_protocol }}://{{ effective_netbird_domain }}/oauth2/.well-known/openid-configuration"
        method: GET
        validate_certs: false
        status_code: 200
      register: public_health
      retries: 60
      delay: 2
      until: public_health.status == 200
      when:
        - start_netbird_services | bool
        - use_builtin_traefik | bool or use_external_traefik | bool

    - name: Wait for NetBird server through direct endpoint
      ansible.builtin.uri:
        url: "http://{{ upstream_host }}:{{ management_host_port }}/oauth2/.well-known/openid-configuration"
        method: GET
        validate_certs: false
        status_code: 200
      register: direct_health
      retries: 60
      delay: 2
      until: direct_health.status == 200
      when:
        - start_netbird_services | bool
        - use_exposed_container_ports | bool

    - name: Create NetBird proxy token
      ansible.builtin.shell: >-
        {{ compose_bin }} exec -T netbird-server
        /go/bin/netbird-server token create --name default-proxy --config /etc/netbird/config.yaml
        2>/dev/null | awk '/^Token:/ {print $2}'
      args:
        chdir: "{{ netbird_project_dir }}"
      register: proxy_token_result
      changed_when: proxy_token_result.stdout | length > 0
      failed_when: proxy_token_result.stdout | trim | length == 0
      no_log: true
      when:
        - start_netbird_services | bool
        - use_netbird_proxy | bool

    - name: Wait for CrowdSec LAPI when enabled
      ansible.builtin.command: "{{ compose_bin }} exec -T crowdsec cscli lapi status"
      args:
        chdir: "{{ netbird_project_dir }}"
      register: crowdsec_status
      changed_when: false
      retries: 30
      delay: 2
      until: crowdsec_status.rc == 0
      when:
        - start_netbird_services | bool
        - use_crowdsec | bool

    - name: Register CrowdSec bouncer when enabled
      ansible.builtin.command: "{{ compose_bin }} exec -T crowdsec cscli bouncers add netbird-proxy -o raw"
      args:
        chdir: "{{ netbird_project_dir }}"
      register: crowdsec_bouncer_result
      changed_when: crowdsec_bouncer_result.stdout | length > 0
      failed_when: crowdsec_bouncer_result.stdout | trim | length == 0
      no_log: true
      when:
        - start_netbird_services | bool
        - use_crowdsec | bool

    - name: Render final proxy.env
      ansible.builtin.copy:
        dest: "{{ netbird_project_dir }}/proxy.env"
        mode: "0600"
        content: |
          # NetBird Proxy Configuration
          NB_PROXY_DEBUG_LOGS=false
          NB_PROXY_MANAGEMENT_ADDRESS=http://netbird-server:80
          NB_PROXY_ALLOW_INSECURE=true
          NB_PROXY_DOMAIN={{ effective_netbird_domain }}
          NB_PROXY_ADDRESS=:8443
          NB_PROXY_TOKEN={{ proxy_token_result.stdout | trim }}
          NB_PROXY_CERTIFICATE_DIRECTORY=/certs
          NB_PROXY_ACME_CERTIFICATES=true
          NB_PROXY_ACME_CHALLENGE_TYPE=tls-alpn-01
          NB_PROXY_FORWARDED_PROTO=https
          NB_PROXY_PROXY_PROTOCOL=true
          NB_PROXY_TRUSTED_PROXIES={{ traefik_ip }}
          {% if use_crowdsec | bool %}
          NB_PROXY_CROWDSEC_API_URL=http://crowdsec:8080
          NB_PROXY_CROWDSEC_API_KEY={{ crowdsec_bouncer_result.stdout | trim }}
          {% endif %}
      no_log: true
      when:
        - start_netbird_services | bool
        - use_netbird_proxy | bool

    - name: Start NetBird proxy service
      ansible.builtin.command: "{{ compose_bin }} up -d proxy"
      args:
        chdir: "{{ netbird_project_dir }}"
      when:
        - start_netbird_services | bool
        - use_netbird_proxy | bool

  post_tasks:
    - name: Show deployment summary
      ansible.builtin.debug:
        msg:
          - "NetBird files are in {{ netbird_project_dir }}."
          - "Dashboard: {{ netbird_http_protocol }}://{{ effective_netbird_domain }}"
          - "Open ports: 80/tcp and 443/tcp for built-in Traefik; {{ netbird_stun_port }}/udp for STUN."
          - "For nginx/npm/caddy/manual, configure the generated reverse proxy file before relying on public access."
