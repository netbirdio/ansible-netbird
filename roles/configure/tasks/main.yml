---
# Role: community.ansible_netbird.configure
#
# Applies NetBird logical configuration from YAML files via the NetBird REST API.
# Manages groups, policies, networks, DNS (nameservers + zones), posture checks,
# and account settings.
#
# Runs in preview mode by default — shows a read-only diff of what would change.
# To apply changes, set commit=true. Strict mode (strict=true) removes resources
# not defined in YAML.
#
# Execution order (respects dependencies):
#   1. Account settings    (no dependencies)
#   2. Posture checks      (no dependencies, needed by policies)
#   3. Groups              (no dependencies, needed by everything else)
#   4. Setup keys          (depend on groups for auto_groups)
#   5. DNS                 (depend on groups)
#   6. Networks            (depend on groups)
#   7. Policies            (depend on groups + posture checks)
#
# Required variables:
#   - config_dir: Path to your config directory
#   - netbird_api_url: NetBird API URL
#   - netbird_api_token: NetBird API token
#
# Optional variables:
#   - commit: Apply changes (default: false)
#   - strict: Remove resources not in config (default: false)
#   - netbird_validate_certs: Validate API TLS certs (default: true)

# =========================================================================
# Validation (outside the module_defaults block so we get nice error messages
# if variables are undefined)
# =========================================================================
- name: Validate API configuration
  ansible.builtin.assert:
    that:
      - netbird_api_url is defined
      - netbird_api_url | length > 0
      - netbird_api_token is defined
      - netbird_api_token | length > 0
      - config_dir is defined
      - config_dir | length > 0
    fail_msg: |
      Configuration is missing!
      Required variables:
        config_dir: "/path/to/netbird_config"
        netbird_api_url: "https://netbird.example.com"
        netbird_api_token: "your-api-token"

# `include_vars: dir:` resolves relative paths against the role's vars/
# directory rather than the playbook CWD, so a relative config_dir blows up
# the access_control / dns loads. Canonicalize once and route every
# downstream reference through `_config_dir_abs` -- a `set_fact` cannot
# override the role's `config_dir` input because `include_role: vars:`
# has higher precedence, so a separate fact name is required.
- name: Normalize config_dir to absolute path
  ansible.builtin.set_fact:
    _config_dir_abs: "{{ config_dir | expanduser | realpath }}"

- name: Display target environment
  ansible.builtin.debug:
    msg: >-
      NetBird {{ _config_dir_abs | basename | upper }} —
      {{ 'APPLY MODE' if commit | bool else 'PREVIEW MODE (read-only, no changes)' }}{{ ' + STRICT (unmanaged resources will be removed)' if strict | bool else '' }}
      — config from {{ _config_dir_abs }}/

- name: Check config directory exists
  ansible.builtin.stat:
    path: "{{ _config_dir_abs }}"
  register: config_dir_stat
  delegate_to: localhost

- name: Fail if config directory doesn't exist
  ansible.builtin.fail:
    msg: "Config directory not found: {{ _config_dir_abs }}"
  when: not config_dir_stat.stat.exists

# =========================================================================
# Load all configuration files
# =========================================================================
- name: Load settings
  ansible.builtin.include_vars:
    file: "{{ _config_dir_abs }}/settings.yml"

- name: Load access control (groups, posture checks, policies)
  ansible.builtin.include_vars:
    dir: "{{ _config_dir_abs }}/access_control"
    extensions: ['yml', 'yaml']

- name: Load DNS configuration (nameservers, zones, settings)
  ansible.builtin.include_vars:
    dir: "{{ _config_dir_abs }}/dns"
    extensions: ['yml', 'yaml']

- name: Load networks
  ansible.builtin.include_vars:
    file: "{{ _config_dir_abs }}/networks.yml"

- name: Check if setup keys config exists
  ansible.builtin.stat:
    path: "{{ _config_dir_abs }}/setup_keys.yml"
  register: _setup_keys_file
  delegate_to: localhost

- name: Load setup keys
  ansible.builtin.include_vars:
    file: "{{ _config_dir_abs }}/setup_keys.yml"
  when: _setup_keys_file.stat.exists

- name: Display configuration summary
  ansible.builtin.debug:
    msg:
      - "Configuration loaded from: {{ _config_dir_abs }}/"
      - "  Settings:         {{ 'configured' if netbird_settings | default({}) | length > 0 else 'empty' }}"
      - "  Groups:           {{ netbird_groups | default([]) | length }}"
      - "  Posture checks:   {{ netbird_posture_checks | default([]) | length }}"
      - "  Policies:         {{ netbird_policies | default([]) | length }}"
      - "  Setup keys:       {{ netbird_setup_keys | default([]) | length }}"
      - "  DNS nameservers:  {{ netbird_dns_nameserver_groups | default([]) | length }}"
      - "  DNS zones:        {{ netbird_dns_zones | default([]) | length }}"
      - "  Networks:         {{ netbird_networks | default([]) | length }}"

# =========================================================================
# All API-calling tasks wrapped in a block with module_defaults
# =========================================================================
- name: Configure NetBird resources
  block:
    # =====================================================================
    # PHASE 0a: Pre-flight VALUE validation (pure config, no API calls)
    #
    # Catches structurally-invalid field values before any mutation, for the
    # small set of checks that are unambiguous and API-version-stable: policy
    # rule ports / port_ranges (ints in 1-65535, start <= end) and setup-key
    # expires_in (> 0). This notably catches inverted port ranges, which the
    # NetBird API itself accepts silently. CIDR / DNS-record / posture-check
    # value validation is intentionally left to the API (reimplementing those
    # rules risks rejecting configs the API would accept).
    # =====================================================================
    - name: "Pre-flight: collect invalid field values"
      ansible.builtin.set_fact:
        _pf_value_problems: >-
          {{ netbird_policies | default([])
             | community.ansible_netbird.netbird_value_problems(setup_keys=netbird_setup_keys | default([])) }}

    - name: "Pre-flight: fail fast on invalid field values (no changes applied)"
      ansible.builtin.assert:
        that:
          - _pf_value_problems | length == 0
        quiet: true
        fail_msg: |
          Pre-flight validation failed — NO changes were applied.

          The following field values are invalid:
          {% for p in _pf_value_problems %}
            - {{ p }}
          {% endfor %}
        success_msg: "Pre-flight validation passed — field values are valid."

    # =====================================================================
    # PHASE 0b: Pre-flight reference validation (runs before ANY mutation)
    #
    # Resolves every group / posture-check / peer reference in the config
    # against what exists in the control plane PLUS what this run will create,
    # and fails fast if any reference is unknown. This prevents a half-applied
    # state: without it a typo'd or not-yet-synced (IdP/SCIM) group name only
    # surfaces during PHASE 2 resolution — AFTER settings, posture checks and
    # groups have already been written to the API. Runs in both preview and
    # commit modes so a bad reference is caught the moment the role runs.
    # =====================================================================
    - name: "Pre-flight: fetch current groups"
      community.ansible_netbird.netbird_info:
        resource: groups
      register: _pf_groups

    - name: "Pre-flight: fetch current posture checks"
      community.ansible_netbird.netbird_info:
        resource: posture_checks
      register: _pf_posture

    - name: "Pre-flight: fetch current peers"
      community.ansible_netbird.netbird_info:
        resource: peers
      register: _pf_peers

    # Names this run will create are valid references even though they don't
    # exist on the API yet — map name→name as a placeholder (only key
    # membership matters for validation; the value is discarded). Items declared
    # state: absent are excluded because PHASE 1 removes them, so they will not
    # exist by the time references are resolved. The live API maps are combined
    # LAST so real name→id entries win on collisions — otherwise a placeholder
    # name→name would shadow the live ID and falsely reject a valid raw-ID
    # reference to a group/check that is also declared in YAML. Control-plane
    # groups (including IdP/SCIM issued=jwt groups) are valid because they come
    # straight from the live groups list.
    # Names of groups/posture checks this run will create (state present or
    # unspecified). state: absent items are excluded — PHASE 1 deletes them, so
    # they will not exist when references are resolved. The two-pass selectattr
    # keeps items with no 'state' key without ever evaluating an equality test
    # against an undefined attribute (which raises 'dict object has no attribute
    # state' under Ansible's strict undefined handling).
    - name: "Pre-flight: collect names this run will create"
      ansible.builtin.set_fact:
        _pf_created_groups: >-
          {{ (netbird_groups | default([]) | selectattr('state', 'undefined') | map(attribute='name') | list)
             + (netbird_groups | default([]) | selectattr('state', 'defined') | rejectattr('state', 'eq', 'absent') | map(attribute='name') | list) }}
        _pf_created_posture: >-
          {{ (netbird_posture_checks | default([]) | selectattr('state', 'undefined') | map(attribute='name') | list)
             + (netbird_posture_checks | default([]) | selectattr('state', 'defined') | rejectattr('state', 'eq', 'absent') | map(attribute='name') | list) }}

    - name: "Pre-flight: build validation maps (control-plane wins over to-be-created)"
      ansible.builtin.set_fact:
        _pf_group_ids: >-
          {{ dict(_pf_created_groups | zip(_pf_created_groups))
             | combine(dict(_pf_groups.data | map(attribute='name') | zip(_pf_groups.data | map(attribute='id')))) }}
        _pf_posture_ids: >-
          {{ dict(_pf_created_posture | zip(_pf_created_posture))
             | combine(dict(_pf_posture.data | map(attribute='name') | zip(_pf_posture.data | map(attribute='id')))) }}
        _pf_peer_ids: >-
          {{ dict(_pf_peers.data | map(attribute='hostname') | zip(_pf_peers.data | map(attribute='id')))
             | combine(dict(_pf_peers.data | map(attribute='name') | zip(_pf_peers.data | map(attribute='id')))) }}

    - name: "Pre-flight: collect unresolved references"
      ansible.builtin.set_fact:
        _pf_missing: >-
          {{ (netbird_policies | default([]) | community.ansible_netbird.netbird_missing_refs('policy', group_ids=_pf_group_ids, posture_check_ids=_pf_posture_ids, peer_ids=_pf_peer_ids))
             + (netbird_networks | default([]) | community.ansible_netbird.netbird_missing_refs('network', group_ids=_pf_group_ids, peer_ids=_pf_peer_ids))
             + (netbird_setup_keys | default([]) | community.ansible_netbird.netbird_missing_refs('setup_key', group_ids=_pf_group_ids))
             + (netbird_dns_nameserver_groups | default([]) | community.ansible_netbird.netbird_missing_refs('dns_nameserver_group', group_ids=_pf_group_ids))
             + (netbird_dns_zones | default([]) | community.ansible_netbird.netbird_missing_refs('dns_zone', group_ids=_pf_group_ids))
             + (netbird_dns_disabled_management_groups | default([]) | community.ansible_netbird.netbird_missing_names(_pf_group_ids, 'group', 'DNS disabled_management_groups'))
             + ((netbird_settings | default({})).jwt_allow_groups | default([]) | community.ansible_netbird.netbird_missing_names(_pf_group_ids, 'group', 'settings jwt_allow_groups'))
             + ((netbird_settings | default({})).peer_expose_groups | default([]) | community.ansible_netbird.netbird_missing_names(_pf_group_ids, 'group', 'settings peer_expose_groups'))
             + ((netbird_settings | default({})).extra_network_traffic_logs_groups | default([]) | community.ansible_netbird.netbird_missing_names(_pf_group_ids, 'group', 'settings extra_network_traffic_logs_groups')) }}

    - name: "Pre-flight: fail fast on unresolved references (no changes applied)"
      ansible.builtin.assert:
        that:
          - _pf_missing | length == 0
        quiet: true
        fail_msg: |
          Pre-flight validation failed — NO changes were applied.

          The following references in your config do not match any group, posture
          check, or peer that exists in the NetBird control plane, and are not
          defined in your config files either:
          {% for m in _pf_missing %}
            - {{ m.kind }} '{{ m.name }}' (in {{ m.context }})
          {% endfor %}

          If a group is expected to come from IdP/SCIM sync, verify it has actually
          synced into NetBird and that the name matches exactly. Otherwise, check
          for a typo or a missing definition in your config files.
        success_msg: "Pre-flight validation passed — all references resolve."

    # =====================================================================
    # PHASE 0c: Strict-mode blast-radius guard (runs before ANY mutation)
    #
    # In strict mode every resource present on the control plane but absent
    # from the loaded config is deleted (PHASE 5). If the config loaded with
    # zero managed resources — a wrong/typo'd config_dir, an empty directory,
    # or YAML files that silently failed to populate the expected variables —
    # strict mode would classify EVERY policy, network, DNS entry, setup key,
    # posture check and group as unmanaged and remove the lot. A strict apply
    # against an empty config is never a legitimate operation (to clear the
    # account, delete resources explicitly with state: absent), so refuse it
    # here, before the mutation boundary, while nothing has been written.
    # =====================================================================
    - name: "Pre-flight: refuse strict apply against an empty config (no changes applied)"
      ansible.builtin.assert:
        that:
          - >-
            (
              (netbird_groups | default([])) +
              (netbird_policies | default([])) +
              (netbird_networks | default([])) +
              (netbird_dns_nameserver_groups | default([])) +
              (netbird_dns_zones | default([])) +
              (netbird_setup_keys | default([])) +
              (netbird_posture_checks | default([]))
            ) | length > 0
        quiet: true
        fail_msg: |
          Pre-flight validation failed — NO changes were applied.

          Strict mode (strict=true) is enabled but the configuration loaded from
          {{ _config_dir_abs }}/ contains zero managed resources. A strict apply
          deletes everything on the control plane that is not in the config, so
          from an empty config it would remove ALL groups, policies, networks,
          DNS nameserver groups, DNS zones, setup keys and posture checks.

          This almost always means config_dir points at the wrong place or the
          YAML files failed to load. Verify the path and re-run. If you genuinely
          intend to remove resources, declare them explicitly with state: absent
          rather than relying on an empty strict apply.
        success_msg: "Pre-flight validation passed — strict apply has a non-empty config."
      when: commit | bool and strict | bool

    # All pre-flight gates passed. From here on, an apply (commit=true) may
    # mutate the control plane, so a failure below means a *partial* apply.
    # The rescue at the end of this block uses this flag to tell the operator
    # whether anything was actually written.
    - name: "Pre-flight passed — mark mutation boundary"
      ansible.builtin.set_fact:
        _nb_mutations_started: "{{ commit | bool }}"

    # =====================================================================
    # PHASE 1: Apply foundational resources (commit mode only)
    # =====================================================================

    # --- 1. Settings ---
    # NOTE: account settings can reference groups (jwt_allow_groups,
    # peer_expose_groups, extra_network_traffic_logs_groups). Those need the
    # group name→ID map, which is only built in PHASE 2 after groups are
    # created — so the "Apply settings" task is applied there, not here.

    # --- 2. Posture Checks (no dependencies, needed by policies) ---
    - name: Manage posture checks
      community.ansible_netbird.netbird_posture_check:
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        checks: "{{ item.checks }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ netbird_posture_checks | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - commit | bool
        - netbird_posture_checks | default([]) | length > 0

    # --- 3. Groups (no dependencies, needed by DNS/networks/policies) ---
    - name: Manage groups
      community.ansible_netbird.netbird_group:
        name: "{{ item.name }}"
        peers: "{{ item.peers | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ netbird_groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - commit | bool
        - netbird_groups | default([]) | length > 0

    # =====================================================================
    # PHASE 2: Fetch API state + build lookup maps (both modes)
    # =====================================================================
    - name: Initialize lookup maps
      ansible.builtin.set_fact:
        group_ids: {}
        posture_check_ids: {}
        peer_ids: {}

    - name: Fetch current groups for ID resolution
      community.ansible_netbird.netbird_info:
        resource: groups
      register: api_groups

    - name: Build group name→ID map
      ansible.builtin.set_fact:
        group_ids: "{{ dict(api_groups.data | map(attribute='name') | zip(api_groups.data | map(attribute='id'))) }}"

    # --- 1. Settings ---
    # Applied here (not in PHASE 1) because the group-list fields below resolve
    # against group_ids, which only exists once groups have been created and
    # fetched above. Group references go through the strict resolver
    # (netbird_resolve_names), which raises on an unknown name — matching the
    # pre-flight — instead of silently dropping it via map('extract').
    - name: Apply settings
      community.ansible_netbird.netbird_account:
        peer_login_expiration_enabled: "{{ netbird_settings.peer_login_expiration_enabled | default(omit) }}"
        peer_login_expiration: "{{ netbird_settings.peer_login_expiration | default(omit) }}"
        peer_inactivity_expiration_enabled: "{{ netbird_settings.peer_inactivity_expiration_enabled | default(omit) }}"
        peer_inactivity_expiration: "{{ netbird_settings.peer_inactivity_expiration | default(omit) }}"
        regular_users_view_blocked: "{{ netbird_settings.regular_users_view_blocked | default(omit) }}"
        groups_propagation_enabled: "{{ netbird_settings.groups_propagation_enabled | default(omit) }}"
        jwt_groups_enabled: "{{ netbird_settings.jwt_groups_enabled | default(omit) }}"
        jwt_groups_claim_name: "{{ netbird_settings.jwt_groups_claim_name | default(omit) }}"
        jwt_allow_groups: "{{ netbird_settings.jwt_allow_groups | community.ansible_netbird.netbird_resolve_names(group_ids, 'group', 'settings jwt_allow_groups') if netbird_settings.jwt_allow_groups is defined else omit }}"
        routing_peer_dns_resolution_enabled: "{{ netbird_settings.routing_peer_dns_resolution_enabled | default(omit) }}"
        dns_domain: "{{ netbird_settings.dns_domain | default(omit) }}"
        network_range: "{{ netbird_settings.network_range | default(omit) }}"
        lazy_connection_enabled: "{{ netbird_settings.lazy_connection_enabled | default(omit) }}"
        auto_update_always: "{{ netbird_settings.auto_update_always | default(omit) }}"
        auto_update_version: "{{ netbird_settings.auto_update_version | default(omit) }}"
        peer_expose_enabled: "{{ netbird_settings.peer_expose_enabled | default(omit) }}"
        peer_expose_groups: "{{ netbird_settings.peer_expose_groups | community.ansible_netbird.netbird_resolve_names(group_ids, 'group', 'settings peer_expose_groups') if netbird_settings.peer_expose_groups is defined else omit }}"
        extra_peer_approval_enabled: "{{ netbird_settings.extra_peer_approval_enabled | default(omit) }}"
        extra_user_approval_required: "{{ netbird_settings.extra_user_approval_required | default(omit) }}"
        extra_network_traffic_logs_enabled: "{{ netbird_settings.extra_network_traffic_logs_enabled | default(omit) }}"
        extra_network_traffic_logs_groups: "{{ netbird_settings.extra_network_traffic_logs_groups | community.ansible_netbird.netbird_resolve_names(group_ids, 'group', 'settings extra_network_traffic_logs_groups') if netbird_settings.extra_network_traffic_logs_groups is defined else omit }}"
        extra_network_traffic_packet_counter_enabled: "{{ netbird_settings.extra_network_traffic_packet_counter_enabled | default(omit) }}"
        state: present
      when:
        - commit | bool
        - netbird_settings | default({}) | length > 0

    - name: Fetch current posture checks for ID resolution
      community.ansible_netbird.netbird_info:
        resource: posture_checks
      register: api_posture_checks

    - name: Build posture check name→ID map
      ansible.builtin.set_fact:
        posture_check_ids: "{{ dict(api_posture_checks.data | map(attribute='name') | zip(api_posture_checks.data | map(attribute='id'))) }}"

    - name: Fetch current peers for ID resolution
      community.ansible_netbird.netbird_info:
        resource: peers
      register: api_peers

    - name: Build peer name→ID map (hostname aliases included)
      # The /api/networks/{id}/routers endpoint returns router.peer as the
      # peer's HOSTNAME (not name). To let exported network configs resolve
      # cleanly, include hostname→id pairs as aliases for name→id.
      # The name map is combined last so peer.name takes precedence on collision.
      ansible.builtin.set_fact:
        peer_ids: >-
          {{ dict(api_peers.data | map(attribute='hostname') | zip(api_peers.data | map(attribute='id')))
             | combine(dict(api_peers.data | map(attribute='name') | zip(api_peers.data | map(attribute='id')))) }}

    - name: Display ID maps
      ansible.builtin.debug:
        msg:
          - "Group IDs resolved: {{ group_ids | length }} groups"
          - "Posture check IDs resolved: {{ posture_check_ids | length }} checks"
          - "Peer IDs resolved: {{ peer_ids | length }} peers"

    # =====================================================================
    # Resolve group/posture-check names to IDs in config variables
    # =====================================================================
    - name: Resolve auto_groups in setup keys
      ansible.builtin.set_fact:
        _resolved_setup_keys: "{{ netbird_setup_keys | default([]) | community.ansible_netbird.netbird_resolve_ids('setup_key', group_ids=group_ids) }}"
      when:
        - commit | bool
        - netbird_setup_keys | default([]) | length > 0

    - name: Resolve group/peer/posture-check names to IDs
      ansible.builtin.set_fact:
        _resolved_policies: "{{ netbird_policies | default([]) | community.ansible_netbird.netbird_resolve_ids('policy', group_ids=group_ids, posture_check_ids=posture_check_ids, peer_ids=peer_ids) }}"
        _resolved_networks: "{{ netbird_networks | default([]) | community.ansible_netbird.netbird_resolve_ids('network', group_ids=group_ids, peer_ids=peer_ids) }}"
      when: commit | bool

    # --- 4. Setup Keys (depend on groups for auto_groups) ---
    - name: Manage setup keys
      community.ansible_netbird.netbird_setup_key:
        name: "{{ item.name }}"
        key_type: "{{ item.key_type | default('one-off') }}"
        expires_in: "{{ item.expires_in | default(86400) }}"
        revoked: "{{ item.revoked | default(false) }}"
        auto_groups: "{{ item.auto_groups | default(omit) }}"
        usage_limit: "{{ item.usage_limit | default(0) }}"
        ephemeral: "{{ item.ephemeral | default(false) }}"
        allow_extra_dns_labels: "{{ item.allow_extra_dns_labels | default(false) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ _resolved_setup_keys | default(netbird_setup_keys | default([])) }}"
      loop_control:
        label: "{{ item.name }}"
      register: netbird_setup_key_results
      # On creation the result carries the one-time plaintext key. Without
      # no_log, running at -v or higher dumps every created key to the job
      # log. The gated "Display created setup key values" task below is the
      # sanctioned (opt-in) way to reveal them.
      no_log: true
      when:
        - commit | bool
        - netbird_setup_keys | default([]) | length > 0

    - name: Display created setup key values
      ansible.builtin.debug:
        msg: >-
          NOTICE: Setup key "{{ item.item.name }}" created.
          Key value: {{ item.setup_key.key }}
          This value is shown ONCE and cannot be retrieved later.
          Store it securely (e.g., HashiCorp Vault).
      loop: "{{ (netbird_setup_key_results | default({'results': []})).results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - display_setup_key_values | bool
        - item.changed | default(false)
        - item.setup_key.key is defined

    # =====================================================================
    # PHASE 3: Fetch remaining API state (preview or strict mode)
    # =====================================================================
    - name: Fetch current setup keys
      community.ansible_netbird.netbird_info:
        resource: setup_keys
      register: api_setup_keys
      when: not commit | bool or strict | bool

    - name: Fetch current DNS nameserver groups
      community.ansible_netbird.netbird_info:
        resource: dns_nameservers
      register: api_dns_nameservers
      when: not commit | bool or strict | bool

    - name: Fetch current networks
      community.ansible_netbird.netbird_info:
        resource: networks
      register: api_networks
      when: not commit | bool or strict | bool

    - name: Fetch routers for each network (preview diff)
      ansible.builtin.uri:
        url: "{{ netbird_api_url }}/api/networks/{{ item.id }}/routers"
        method: GET
        headers:
          Authorization: "Token {{ netbird_api_token }}"
          Accept: "application/json"
        return_content: true
        validate_certs: "{{ netbird_validate_certs | default(true) }}"
      loop: "{{ api_networks.data | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      register: preview_network_routers
      no_log: true
      when:
        - not commit | bool
        - api_networks.data | default([]) | length > 0

    - name: Fetch current DNS zones
      community.ansible_netbird.netbird_info:
        resource: dns_zones
      register: api_dns_zones
      when: not commit | bool or strict | bool

    - name: Fetch current policies
      community.ansible_netbird.netbird_info:
        resource: policies
      register: api_policies
      when: not commit | bool or strict | bool

    - name: Fetch current account settings
      community.ansible_netbird.netbird_info:
        resource: accounts
      register: api_accounts
      when: not commit | bool or strict | bool

    - name: Generate diff report
      ansible.builtin.include_tasks: preview_diff_report.yml
      when: not commit | bool

    # =====================================================================
    # PHASE 4: Apply dependent resources (commit mode only)
    # =====================================================================

    # --- 5. DNS (depend on groups) ---
    - name: Manage DNS nameserver groups
      community.ansible_netbird.netbird_dns:
        resource_type: nameserver_group
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        nameservers: "{{ item.nameservers }}"
        groups: "{{ item.groups | default([], true) | community.ansible_netbird.netbird_resolve_names(group_ids, 'group', 'DNS nameserver group ' + item.name + ' groups') }}"
        # Coerce null/undefined to [] so the apply path heals backend state
        # where domains was seeded as null (the dashboard crashes on null).
        domains: "{{ item.domains | default([], true) }}"
        enabled: "{{ item.enabled | default(true) }}"
        primary: "{{ item.primary | default(false) }}"
        search_domains_enabled: "{{ item.search_domains_enabled | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ netbird_dns_nameserver_groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - commit | bool
        - netbird_dns_nameserver_groups | default([]) | length > 0

    - name: Manage DNS settings
      community.ansible_netbird.netbird_dns:
        resource_type: settings
        disabled_management_groups: "{{ netbird_dns_disabled_management_groups | default([]) | community.ansible_netbird.netbird_resolve_names(group_ids, 'group', 'DNS disabled_management_groups') }}"
        state: present
      when:
        - commit | bool
        - netbird_dns_disabled_management_groups is defined

    # --- 6. DNS Zones (depend on groups) ---
    - name: Manage DNS zones
      community.ansible_netbird.netbird_dns_zone:
        name: "{{ item.name }}"
        domain: "{{ item.domain | default(omit) }}"
        enabled: "{{ item.enabled | default(true) }}"
        enable_search_domain: "{{ item.enable_search_domain | default(false) }}"
        distribution_groups: "{{ item.distribution_groups | default([]) | community.ansible_netbird.netbird_resolve_names(group_ids, 'group', 'DNS zone ' + item.name + ' distribution_groups') }}"
        records: "{{ item.records | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ netbird_dns_zones | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - commit | bool
        - netbird_dns_zones | default([]) | length > 0

    # --- 7. Networks (depend on groups) ---
    - name: Manage networks
      community.ansible_netbird.netbird_network:
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        routers: "{{ item.routers | default(omit) }}"
        resources: "{{ item.resources | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ _resolved_networks | default(netbird_networks | default([])) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - commit | bool
        - netbird_networks | default([]) | length > 0

    # --- 8. Policies (depend on groups + posture checks) ---
    - name: Manage policies
      community.ansible_netbird.netbird_policy:
        name: "{{ item.name }}"
        description: "{{ item.description | default('') }}"
        enabled: "{{ item.enabled | default(true) }}"
        source_posture_checks: "{{ item.source_posture_checks | default(omit) }}"
        rules: "{{ item.rules | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ _resolved_policies | default(netbird_policies | default([])) }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - commit | bool
        - netbird_policies | default([]) | length > 0

    # =====================================================================
    # PHASE 5: Strict mode — remove unmanaged resources
    # =====================================================================
    - name: "Strict: Build list of protected group names"
      ansible.builtin.set_fact:
        _protected_groups: "{{ api_groups.data | selectattr('issued', 'defined') | selectattr('issued', 'equalto', 'jwt') | map(attribute='name') | list + ['All'] }}"
        _yaml_group_names: "{{ netbird_groups | default([]) | map(attribute='name') | list }}"
        _yaml_pc_names: "{{ netbird_posture_checks | default([]) | map(attribute='name') | list }}"
        _yaml_sk_names: "{{ netbird_setup_keys | default([]) | map(attribute='name') | list }}"
        _yaml_dns_names: "{{ netbird_dns_nameserver_groups | default([]) | map(attribute='name') | list }}"
        _yaml_dns_zone_names: "{{ netbird_dns_zones | default([]) | map(attribute='name') | list }}"
        _yaml_net_names: "{{ netbird_networks | default([]) | map(attribute='name') | list }}"
        _yaml_pol_names: "{{ netbird_policies | default([]) | map(attribute='name') | list }}"
      when: commit | bool and strict | bool

    - name: "Strict: Identify unmanaged resources"
      ansible.builtin.set_fact:
        _orphaned_policies: "{{ api_policies.data | map(attribute='name') | list | difference(_yaml_pol_names) }}"
        _orphaned_networks: "{{ api_networks.data | map(attribute='name') | list | difference(_yaml_net_names) }}"
        _orphaned_dns: "{{ api_dns_nameservers.data | map(attribute='name') | list | difference(_yaml_dns_names) }}"
        _orphaned_dns_zones: "{{ api_dns_zones.data | map(attribute='name') | list | difference(_yaml_dns_zone_names) }}"
        _orphaned_setup_keys: "{{ api_setup_keys.data | map(attribute='name') | list | difference(_yaml_sk_names) }}"
        _orphaned_posture_checks: "{{ api_posture_checks.data | map(attribute='name') | list | difference(_yaml_pc_names) }}"
        _orphaned_groups: "{{ api_groups.data | map(attribute='name') | list | difference(_yaml_group_names) | difference(_protected_groups) }}"
      when: commit | bool and strict | bool

    - name: "Strict: Display resources to be removed"
      ansible.builtin.debug:
        msg:
          - "Strict mode — removing unmanaged resources:"
          - "  Policies:       {{ _orphaned_policies | length }} ({{ _orphaned_policies | join(', ') }})"
          - "  Networks:       {{ _orphaned_networks | length }} ({{ _orphaned_networks | join(', ') }})"
          - "  DNS nameservers: {{ _orphaned_dns | length }} ({{ _orphaned_dns | join(', ') }})"
          - "  DNS zones:      {{ _orphaned_dns_zones | length }} ({{ _orphaned_dns_zones | join(', ') }})"
          - "  Setup keys:     {{ _orphaned_setup_keys | length }} ({{ _orphaned_setup_keys | join(', ') }})"
          - "  Posture checks: {{ _orphaned_posture_checks | length }} ({{ _orphaned_posture_checks | join(', ') }})"
          - "  Groups:         {{ _orphaned_groups | length }} ({{ _orphaned_groups | join(', ') }})"
      when: commit | bool and strict | bool

    - name: "Strict: Remove unmanaged policies"
      community.ansible_netbird.netbird_policy:
        name: "{{ item }}"
        state: absent
      loop: "{{ _orphaned_policies }}"
      loop_control:
        label: "{{ item }}"
      when: commit | bool and strict | bool and _orphaned_policies | length > 0

    - name: "Strict: Remove unmanaged networks"
      community.ansible_netbird.netbird_network:
        name: "{{ item }}"
        state: absent
      loop: "{{ _orphaned_networks }}"
      loop_control:
        label: "{{ item }}"
      when: commit | bool and strict | bool and _orphaned_networks | length > 0

    - name: "Strict: Remove unmanaged DNS nameserver groups"
      community.ansible_netbird.netbird_dns:
        resource_type: nameserver_group
        name: "{{ item }}"
        state: absent
      loop: "{{ _orphaned_dns }}"
      loop_control:
        label: "{{ item }}"
      when: commit | bool and strict | bool and _orphaned_dns | length > 0

    - name: "Strict: Remove unmanaged DNS zones"
      community.ansible_netbird.netbird_dns_zone:
        name: "{{ item }}"
        state: absent
      loop: "{{ _orphaned_dns_zones }}"
      loop_control:
        label: "{{ item }}"
      when: commit | bool and strict | bool and _orphaned_dns_zones | length > 0

    - name: "Strict: Remove unmanaged setup keys"
      community.ansible_netbird.netbird_setup_key:
        name: "{{ item }}"
        state: absent
      loop: "{{ _orphaned_setup_keys }}"
      loop_control:
        label: "{{ item }}"
      when: commit | bool and strict | bool and _orphaned_setup_keys | length > 0

    - name: "Strict: Remove unmanaged posture checks"
      community.ansible_netbird.netbird_posture_check:
        name: "{{ item }}"
        state: absent
      loop: "{{ _orphaned_posture_checks }}"
      loop_control:
        label: "{{ item }}"
      when: commit | bool and strict | bool and _orphaned_posture_checks | length > 0

    - name: "Strict: Remove unmanaged groups"
      community.ansible_netbird.netbird_group:
        name: "{{ item }}"
        state: absent
      loop: "{{ _orphaned_groups }}"
      loop_control:
        label: "{{ item }}"
      when: commit | bool and strict | bool and _orphaned_groups | length > 0

    # =====================================================================
    # Summary
    # =====================================================================
    - name: Configuration complete
      ansible.builtin.debug:
        msg: "NetBird configuration applied successfully from {{ _config_dir_abs }}/"
      when: commit | bool

  # =======================================================================
  # Failure reporting: a value rejected by the NetBird API (e.g. a bad CIDR,
  # DNS record, or posture-check value — things the pre-flight intentionally
  # does not validate) can fail an apply part-way through. The pre-flight
  # gates run before any mutation, so if we never reached the mutation
  # boundary, nothing was written. Otherwise surface the apply order so the
  # operator knows what was applied vs not, then re-raise.
  # =======================================================================
  rescue:
    - name: "Report failure context"
      ansible.builtin.debug:
        msg: >-
          {{
            ['Pre-flight validation failed — NO changes were applied. Fix the reported issue and re-run.']
            if not (_nb_mutations_started | default(false) | bool)
            else [
              'APPLY FAILED PART-WAY THROUGH — the control plane may be partially updated.',
              'Resources are applied in this order: posture checks → groups → account settings → setup keys → DNS nameservers → DNS settings → DNS zones → networks → policies.',
              'Everything before the failed task was applied; the failed task and everything after were NOT.',
              'Failed task: ' ~ (ansible_failed_task.name | default('unknown')),
              'Error: ' ~ (ansible_failed_result.msg | default(ansible_failed_result | to_json)),
              'Recovery: fix the reported value and re-run (the apply is idempotent), or restore from a safe_apply.yml backup.'
            ]
          }}

    - name: "Re-raise the original failure"
      ansible.builtin.fail:
        msg: >-
          configure role failed{{ ' after partial apply' if (_nb_mutations_started | default(false) | bool) else ' during pre-flight (no changes applied)' }}:
          {{ ansible_failed_result.msg | default('see above') }}

  module_defaults:
    group/community.ansible_netbird.netbird:
      api_url: "{{ netbird_api_url }}"
      api_token: "{{ netbird_api_token }}"
      validate_certs: "{{ netbird_validate_certs }}"
