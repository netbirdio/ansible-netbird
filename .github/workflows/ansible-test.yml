---
name: ansible-test

# Run sanity + unit tests on every push to main and every PR. The matrix
# covers the ansible-core versions we explicitly support (declared via
# `requires_ansible` in meta/runtime.yml). Integration tests are not run
# here -- they require live NetBird credentials and live in the external
# ansible-netbird-testing harness.

on:
  push:
    branches:
      - main
  pull_request:

# Cancel in-flight runs when a new commit is pushed to the same branch
# -- a fresh push supersedes the prior one, no point burning minutes on
# an obsolete commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: this workflow only reads the repo to run tests.
permissions:
  contents: read

jobs:
  sanity:
    name: "sanity (ansible-core ${{ matrix.ansible }}, py${{ matrix.python }})"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "2.15"
          - "2.16"
          - "2.17"
        python:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
        # ansible-core 2.15 supports Python 3.9-3.11; 2.16/2.17 support
        # 3.10-3.12. Skip controller/python combos that ansible-core
        # itself refuses.
        exclude:
          - ansible: "2.15"
            python: "3.12"
          - ansible: "2.16"
            python: "3.9"
          - ansible: "2.17"
            python: "3.9"
    steps:
      - name: Check out collection
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # ansible-test requires the collection to live at
          # ansible_collections/<namespace>/<name>/ in the workspace.
          path: ansible_collections/community/ansible_netbird

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: pip install "ansible-core>=${{ matrix.ansible }}.0,<${{ matrix.ansible }}.99"

      - name: Run sanity tests
        working-directory: ansible_collections/community/ansible_netbird
        run: ansible-test sanity --docker default --color --python ${{ matrix.python }}

  units:
    name: "units (ansible-core ${{ matrix.ansible }}, py${{ matrix.python }})"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "2.15"
          - "2.16"
          - "2.17"
        python:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
        exclude:
          - ansible: "2.15"
            python: "3.12"
          - ansible: "2.16"
            python: "3.9"
          - ansible: "2.17"
            python: "3.9"
    steps:
      - name: Check out collection
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: ansible_collections/community/ansible_netbird

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: pip install "ansible-core>=${{ matrix.ansible }}.0,<${{ matrix.ansible }}.99"

      - name: Run unit tests
        working-directory: ansible_collections/community/ansible_netbird
        run: ansible-test units --docker default --color --python ${{ matrix.python }} --coverage

      - name: Generate coverage XML
        if: always()
        working-directory: ansible_collections/community/ansible_netbird
        run: ansible-test coverage xml --requirements --group-by command --group-by version

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-ansible-${{ matrix.ansible }}-py${{ matrix.python }}
          path: ansible_collections/community/ansible_netbird/tests/output/reports/coverage*.xml
          if-no-files-found: ignore
